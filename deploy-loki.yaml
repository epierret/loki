apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: loki
  name: loki
  namespace: elbaph
spec:
  replicas: 3
  selector:
    matchLabels:
      app: loki

  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - image: nginx
        name: nginx
        volumeMounts:
        - name: loki-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: loki-volume
        configMap:
          name: loki-cm
